# Tool configuration only — the backend is not packaged as a distributable.
# Runtime dependencies live in requirements.txt; ruff/mypy are CI-only tools.

[tool.ruff]
line-length = 120
target-version = "py312"
# Alembic env.py legitimately mutates sys.path before importing app models,
# and generated migrations are not hand-maintained — exclude both from linting.
exclude = ["alembic"]

[tool.ruff.lint]
# Conservative, high-signal rule set: pyflakes (F), the import/name/syntax
# subsets of pycodestyle (E4/E7/E9), import sorting (I), and pyupgrade (UP).
# Whitespace (E1/E2/E3) and line-length (E5) are intentionally left to the
# formatter rather than enforced as lint failures.
select = ["E4", "E7", "E9", "F", "I", "UP"]

[tool.mypy]
# boto3, qrcode and similar libraries ship without type stubs; don't fail on them.
ignore_missing_imports = true
# The codebase is fully annotated by convention but not yet under strict mypy.
disallow_untyped_defs = false
exclude = ["tests", "alembic"]
