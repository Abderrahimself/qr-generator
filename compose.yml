# compose.yml — Full production stack
# Local build:  podman compose -f compose.yml up --build   (builds images, tags them *-local)
# VM / prod:    set BACKEND_IMAGE / FRONTEND_IMAGE in .env, then `docker compose up -d` (pulls from GHCR)
# Stop: down   |   Reset data: down -v
#
# Requires .env at project root. For any real deployment also set POSTGRES_PASSWORD,
# S3_ACCESS_KEY, S3_SECRET_KEY, S3_PUBLIC_URL, CORS_ORIGINS, and the *_IMAGE vars.

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: qr_generator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  garage:
    image: docker.io/dxflrs/garage:v1.0.1
    restart: unless-stopped
    ports:
      # Host ports are parameterised so a second (staging) stack can publish on
      # different ports. Defaults preserve the production values.
      - "${GARAGE_S3_PORT:-3900}:3900"      # S3 API (browser presigned URLs + host Garage CLI)
      - "${GARAGE_ADMIN_PORT:-3902}:3902"   # Admin API
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro,z
      - garagedata:/var/lib/garage/data
      - garagemeta:/var/lib/garage/meta
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # Local: built from ./backend and tagged with the default below.
    # VM / prod: set BACKEND_IMAGE=ghcr.io/<owner>/<repo>/backend:<tag> in .env to pull instead.
    image: ${BACKEND_IMAGE:-qr-generator-backend:local}
    build: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/qr_generator
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      CACHE_TTL_SECONDS: 86400
      S3_ENDPOINT_URL: http://garage:3900
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:3900}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: qr-codes
      S3_REGION: garage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  frontend:
    image: ${FRONTEND_IMAGE:-qr-generator-frontend:local}
    build:
      context: .                    # root context so the build can read frontend/ and nginx/
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"   # rootless Podman: 8080. On a Docker VM (root) set FRONTEND_PORT=80.
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  valkeydata:
  garagedata:
  garagemeta:
