server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use container DNS resolver — forces re-resolution on each request cycle
    # 10.89.0.1 = Podman netavark DNS (aardvark-dns)
    # 127.0.0.11 = Docker embedded DNS
    # The variable trick ($backend_url) forces nginx to use the resolver at runtime
    resolver 10.89.0.1 127.0.0.11 valid=10s ipv6=off;
    set $backend_url http://backend:8000;

    # Frontend — serve static build, fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy to FastAPI
    location /api/ {
        proxy_pass $backend_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — proxy to FastAPI
    location /health {
        proxy_pass $backend_url;
        proxy_set_header Host $host;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
