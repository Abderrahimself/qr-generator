# Load any dashboard JSON dropped into /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: qr-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
