# Prometheus scrape config for the QR Generator VM.
#
# Rollout order (Phase 5.8): staging is scraped first and verified; the production
# backend target is added afterwards (uncomment the block below) so monitoring is
# proven against staging before it points at prod.
#
# node-exporter and cadvisor are host-global — they already cover BOTH stacks
# (host CPU/mem/disk and every container). Only the app-level /metrics (request
# rate, latency, errors) is per-backend, hence the per-env scrape jobs.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: qr-generator

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # --- Application backends (one job, per-env target labels) ---
  - job_name: qr-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["qr-staging-backend-1:8000"]
        labels:
          env: staging
      # Production backend — enable once monitoring is verified against staging.
      # Also attach prometheus to the qr-generator_default network in the compose file.
      # - targets: ["qr-generator-backend-1:8000"]
      #   labels:
      #     env: production
