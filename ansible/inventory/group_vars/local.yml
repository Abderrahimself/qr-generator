# Connection (initial cloud-image user; the deploy user is created by setup-server.yml)
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

# Provisioning
deploy_user: deploy
# Public key authorized for the deploy user, read from the control node.
deploy_authorized_key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

firewall_allowed:
  - { port: 22, proto: tcp, comment: SSH }
  - { port: 80, proto: tcp, comment: HTTP }
  - { port: 443, proto: tcp, comment: HTTPS }
  # Garage S3 API: the browser fetches QR images via presigned URLs pointing at
  # S3_PUBLIC_URL (http://<vm>:3900), so this port must be reachable from clients.
  - { port: 3900, proto: tcp, comment: Garage S3 (presigned image URLs) }
  # Staging stack (second compose project on the same VM): frontend + Garage S3.
  - { port: 8080, proto: tcp, comment: Staging frontend }
  - { port: 3910, proto: tcp, comment: Staging Garage S3 (presigned image URLs) }
  # Monitoring stack (Phase 5.8): Grafana dashboards + Prometheus UI.
  - { port: 3000, proto: tcp, comment: Grafana }
  - { port: 9090, proto: tcp, comment: Prometheus }

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
