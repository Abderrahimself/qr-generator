---
# Phase 5.8 — deploy the observability stack (Prometheus + Grafana + node-exporter
# + cAdvisor) as its own compose project (qr-monitoring) on the VM.
#
#   cd ansible && ansible-playbook -i inventory/local.yml playbooks/deploy-monitoring.yml -e @secrets.monitoring.yml
#
# Staging-first: prometheus/prometheus.yml scrapes the staging backend and joins
# qr-staging_default. Production is added later (uncomment in the config + compose).
- name: Deploy monitoring stack
  hosts: local
  become: true
  vars:
    monitoring_dir: /opt/qr-monitoring

  tasks:
    - name: Assert Grafana admin password is provided
      ansible.builtin.assert:
        that:
          - grafana_admin_password is defined
          - grafana_admin_password | length > 0
        fail_msg: "Provide grafana_admin_password via -e @secrets.monitoring.yml"

    - name: Create monitoring directory
      ansible.builtin.file:
        path: "{{ monitoring_dir }}"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0755"

    - name: Copy monitoring config tree (compose, prometheus, grafana)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../monitoring/"
        dest: "{{ monitoring_dir }}/"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: preserve
        directory_mode: "0755"

    - name: Render monitoring .env (Grafana admin password)
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/monitoring.env.j2"
        dest: "{{ monitoring_dir }}/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"
      no_log: true

    - name: Pull monitoring images
      ansible.builtin.command:
        cmd: docker compose -f compose.monitoring.yml pull
        chdir: "{{ monitoring_dir }}"

    - name: Start the monitoring stack
      ansible.builtin.command:
        cmd: docker compose -f compose.monitoring.yml up -d
        chdir: "{{ monitoring_dir }}"

  post_tasks:
    - name: Wait for Prometheus to be healthy
      ansible.builtin.uri:
        url: http://localhost:9090/-/healthy
        status_code: 200
      register: prom_health
      retries: 15
      delay: 4
      until: prom_health.status == 200

    - name: Wait for Grafana to be healthy
      ansible.builtin.uri:
        url: http://localhost:3000/api/health
        status_code: 200
      register: graf_health
      retries: 20
      delay: 5
      until: graf_health.status == 200

    - name: Check Prometheus scrape targets are up
      ansible.builtin.uri:
        url: http://localhost:9090/api/v1/targets?state=active
        return_content: true
      register: targets
      retries: 12
      delay: 5
      # Wait until every active target is reporting health=up (no target left "unknown"/"down").
      until: >
        (targets.json.data.activeTargets | length) > 0 and
        (targets.json.data.activeTargets | selectattr('health', 'ne', 'up') | list | length) == 0

    - name: Report monitored targets
      ansible.builtin.debug:
        msg: "{{ targets.json.data.activeTargets | map(attribute='scrapePool') | unique | list }} — all up"
